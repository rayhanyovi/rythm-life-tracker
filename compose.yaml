services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      AUTH_EMAIL_FROM: ${AUTH_EMAIL_FROM:-}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-replace-with-a-long-random-secret}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      CHOKIDAR_USEPOLLING: "true"
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/rythm?schema=public}
      NEXT_PUBLIC_APP_TIMEZONE: ${NEXT_PUBLIC_APP_TIMEZONE:-Asia/Jakarta}
      NEXT_TELEMETRY_DISABLED: "1"
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RYTHM_DEV_SKIP_EMAIL_VERIFICATION: ${RYTHM_DEV_SKIP_EMAIL_VERIFICATION:-}
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - next-cache:/app/.next
      - node_modules:/app/node_modules
    command: >
      sh -c "npm run prisma:generate &&
      npm run prisma:migrate:deploy &&
      npm run dev -- --hostname 0.0.0.0 --port 3000"

  db:
    image: postgres:16-bookworm
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rythm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-rythm}
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  next-cache:
  node_modules:
  postgres-data:
